name: Compilación del firmware QMK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Consultar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi python3-pip git

      - name: Instalar QMK CLI
        run: pip3 install qmk

      - name: Clonar QMK firmware
        run: |
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git ~/qmk_firmware
          cd ~/qmk_firmware
          git submodule update --init --recursive --depth 1

      - name: Copiar teclado a QMK
        run: |
          mkdir -p ~/qmk_firmware/keyboards/replicazeron24k/keymaps/default
          cp config.h              ~/qmk_firmware/keyboards/replicazeron24k/
          cp rules.mk              ~/qmk_firmware/keyboards/replicazeron24k/
          cp replicazeron24k.h     ~/qmk_firmware/keyboards/replicazeron24k/
          cp info.json             ~/qmk_firmware/keyboards/replicazeron24k/
          cp keymaps/default/keymap.c ~/qmk_firmware/keyboards/replicazeron24k/keymaps/default/
          
      - name: Verificar estructura
        run: |
          ls ~/qmk_firmware/keyboards/replicazeron24k/
          ls ~/qmk_firmware/keyboards/replicazeron24k/keymaps/default/
          cat ~/qmk_firmware/keyboards/replicazeron24k/info.json

      - name: Compilar firmware con make
        run: |
          cd ~/qmk_firmware
          make replicazeron24k:default
      - name: Buscar firmware generado
        run: |
          find ~/qmk_firmware/.build -name "*.bin" -o -name "*.hex" -o -name "*.uf2" 2>/dev/null
          ls ~/qmk_firmware/.build/ || echo "Carpeta .build vacía"

      - name: Subir firmware
        uses: actions/upload-artifact@v4
        with:
          name: replicazeron24k-firmware
          path: ~/qmk_firmware/.build/replicazeron24k_default.bin
          if-no-files-found: error
